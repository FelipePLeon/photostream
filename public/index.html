<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>PhotoStream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ── TELA DE LOGIN ───────────────────────────────────── -->
  <div id="loginScreen" class="screen active">
    <div class="login-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="login-card">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">PhotoStream</span>
      </div>
      <p class="login-subtitle">Envie e veja imagens em tempo real</p>

      <div class="field">
        <label for="username">Usuário</label>
        <input type="text" id="username" placeholder="Digite o usuário" autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <div class="password-wrap">
          <input type="password" id="password" placeholder="Digite a senha" autocomplete="current-password">
          <button class="toggle-pw" id="togglePw" type="button" aria-label="Mostrar senha">👁</button>
        </div>
      </div>

      <div id="loginError" class="error-msg hidden"></div>
      <button class="btn-primary" id="loginBtn">Entrar</button>
    </div>
  </div>

  <!-- ── APP PRINCIPAL ───────────────────────────────────── -->
  <div id="appScreen" class="screen">

    <!-- Header -->
    <header class="app-header">
      <span class="logo-sm">◈ PhotoStream</span>
      <button class="btn-logout" id="logoutBtn">Sair</button>
    </header>

    <!-- Tabs — 3 abas -->
    <nav class="tabs">
      <button class="tab active" id="tabUpload">
        <span class="tab-icon">⬆</span> Upload
      </button>
      <button class="tab" id="tabView">
        <span class="tab-icon">◻</span> Visualizar
      </button>
      <button class="tab" id="tabGallery">
        <span class="tab-icon">⊞</span> Galeria
      </button>
    </nav>

    <!-- ── ABA UPLOAD ── -->
    <section class="tab-content active" id="panelUpload">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-inner" id="uploadInner">
          <span class="upload-icon">📷</span>
          <p class="upload-title">Toque para selecionar</p>
          <p class="upload-hint">JPG, PNG, WEBP, GIF · Máx. 10MB</p>
          <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif" hidden>
          <button class="btn-primary" id="selectFileBtn">Escolher imagem</button>
        </div>
        <div class="preview-wrap hidden" id="previewWrap">
          <img id="previewImg" src="" alt="Preview">
          <div class="preview-info">
            <span id="previewName" class="file-name"></span>
            <span id="previewSize" class="file-size"></span>
          </div>
          <div class="preview-actions">
            <button class="btn-secondary" id="cancelBtn">✕ Cancelar</button>
            <button class="btn-primary" id="sendBtn">↑ Enviar</button>
          </div>
        </div>
      </div>
      <div id="uploadStatus" class="upload-status hidden"></div>
    </section>

    <!-- ── ABA VISUALIZAR ── -->
    <section class="tab-content" id="panelView">

      <div class="viewer-toolbar">
        <span id="imgCounter" class="img-counter">— / —</span>
        <button class="btn-icon" id="refreshBtn" title="Atualizar">↺</button>
      </div>

      <!-- Clicar na imagem abre o lightbox -->
      <div class="viewer-area" id="viewerArea">
        <div class="no-images hidden" id="noImages">
          <span class="empty-icon">🖼</span>
          <p>Nenhuma imagem ainda.</p>
          <p class="empty-hint">Faça o upload na aba acima!</p>
        </div>

        <div class="img-stage" id="imgStage">
          <img id="currentImg" src="" alt="Imagem atual" class="viewer-img" title="Toque para expandir">
          <div class="img-loading hidden" id="imgLoading">
            <div class="spinner"></div>
          </div>
        </div>

        <div class="new-badge hidden" id="newBadge">✦ Nova imagem!</div>
      </div>

      <!-- Navegação: Anterior | Baixar | Próxima -->
      <div class="nav-controls">
        <button class="btn-nav" id="prevBtn">← Anterior</button>
        <button class="btn-nav btn-download" id="downloadBtn">↓ Baixar</button>
        <button class="btn-nav" id="nextBtn">Próxima →</button>
      </div>

      <div class="polling-info">
        <span class="dot pulse"></span> Atualizando automaticamente
      </div>
    </section>

    <!-- ── ABA GALERIA ── -->
    <section class="tab-content" id="panelGallery">

      <div class="gallery-toolbar">
        <span id="galleryCount" class="img-counter">— fotos</span>
        <button class="btn-icon" id="galleryRefreshBtn" title="Atualizar">↺</button>
      </div>

      <div class="gallery-loading hidden" id="galleryLoading">
        <div class="spinner"></div>
      </div>

      <div class="no-images hidden" id="galleryEmpty">
        <span class="empty-icon">🖼</span>
        <p>Nenhuma imagem ainda.</p>
        <p class="empty-hint">Faça o upload na aba acima!</p>
      </div>

      <div class="gallery-grid" id="galleryGrid"></div>

    </section>

  </div><!-- /appScreen -->

  <!-- ── LIGHTBOX (TELA CHEIA) ── -->
  <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lightboxClose" aria-label="Fechar">✕</button>

    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Anterior">‹</button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Próxima">›</button>

    <div class="lightbox-inner" id="lightboxInner">
      <img class="lightbox-img" id="lightboxImg" src="" alt="Imagem em tela cheia">
      <div class="lightbox-spinner hidden" id="lightboxSpinner">
        <div class="spinner"></div>
      </div>
    </div>

    <div class="lightbox-footer">
      <span id="lightboxCounter" class="lightbox-counter"></span>
      <a class="lightbox-dl" id="lightboxDownload" target="_blank" rel="noopener">↓ Baixar</a>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
